sonar.projectKey=cloudctlio_cloudctl
sonar.organization=cloudctlio

sonar.projectName=cloudctl
sonar.projectVersion=0.3.0

sonar.sources=cloudctl
sonar.tests=tests
sonar.exclusions=**/__pycache__/**,**/*.pyc
sonar.test.exclusions=**/tests/**

sonar.python.version=3.11,3.12
sonar.python.coverage.reportPaths=coverage.xml
sonar.coverage.exclusions=\
  cloudctl/providers/aws/provider.py,\
  cloudctl/providers/azure/provider.py,\
  cloudctl/providers/gcp/provider.py,\
  cloudctl/ai/**/*.py,\
  cloudctl/fixers/**/*.py,\
  cloudctl/mcp/**/*.py,\
  cloudctl/debug/**/*.py,\
  cloudctl/agent/**/*.py,\
  cloudctl/commands/mcp_cmd.py,\
  cloudctl/commands/debug_cmd.py,\
  cloudctl/commands/agent_cmd.py,\
  cloudctl/commands/ask.py,\
  cloudctl/commands/feedback_cmd.py,\
  cloudctl/config/init_wizard.py
